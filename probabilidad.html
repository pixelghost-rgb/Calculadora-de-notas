<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Probabilidad - Edwin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 550px; width: 100%; }
        h2 { color: #1e3799; text-align: center; border-bottom: 3px solid #4a69bd; padding-bottom: 10px; }
        .section { margin-bottom: 15px; padding: 15px; border: 1px solid #dcdde1; border-radius: 10px; }
        .section-title { font-weight: bold; color: #2f3640; margin-bottom: 10px; display: block; font-size: 0.95em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; text-align: center; font-size: 15px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #4a69bd; outline: none; }
        .btn-calc { width: 100%; padding: 15px; background: #1e3799; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-calc:hover { background: #0c2461; }
        .result-container { margin-top: 20px; text-align: center; padding: 20px; border-radius: 10px; }
        #total { font-size: 3em; font-weight: bold; margin: 0; }
        #status { font-weight: bold; margin-top: 5px; font-size: 1.2em; }
        .extra-section { background-color: #fff9db; border: 2px dashed #f1c40f; }
    </style>
</head>
<body>

<div class="card">
    <h2>Probabilidad: Calculadora</h2>
    
    <div class="section">
        <span class="section-title">Clase de Ejercicios (20%)</span>
        <input type="number" id="clase" placeholder="Nota 0-100" min="0" max="100">
    </div>

    <div class="section">
        <span class="section-title">Asincrónicas y Pruebas cortas (25%)</span>
        <div class="grid" style="margin-bottom: 10px;">
            <input type="number" id="pc1" placeholder="Corta 1 (5%)" min="0" max="100">
            <input type="number" id="pc2" placeholder="Corta 2 (5%)" min="0" max="100">
            <input type="number" id="pc3" placeholder="Corta 3 (5%)" min="0" max="100">
        </div>
        <input type="number" id="datacamp" placeholder="DataCamp (10%)" min="0" max="100">
    </div>

    <div class="section">
        <span class="section-title">Exámenes Parciales (35%)</span>
        <div class="grid">
            <input type="number" id="parcial1" placeholder="Parcial I (15%)" min="0" max="100">
            <input type="number" id="parcial2" placeholder="Parcial II (20%)" min="0" max="100">
        </div>
    </div>

    <div class="section">
        <span class="section-title">Examen Final (20%)</span>
        <input type="number" id="final" placeholder="Nota Examen Final" min="0" max="100">
    </div>

    <div class="section extra-section">
        <span class="section-title">⭐ Proyecto Final (Puntos Extra: 6%)</span>
        <input type="number" id="proyecto" placeholder="Nota Proyecto 0-100" min="0" max="100">
    </div>

    <button class="btn-calc" onclick="calcular()">CALCULAR RESULTADO</button>

    <div id="res-box" class="result-container" style="background: #f8f9fa;">
        <p id="total">0.00</p>
        <p id="status">Esperando notas...</p>
    </div>
</div>

<script>
    function calcular() {
        const getV = (id) => {
            let n = parseFloat(document.getElementById(id).value) || 0;
            return n > 100 ? 100 : (n < 0 ? 0 : n);
        };

        // Componentes que suman el 100%
        let clase = getV('clase') * 0.20;
        let pruebasCortas = (getV('pc1') + getV('pc2') + getV('pc3')) * 0.05;
        let datacamp = getV('datacamp') * 0.10;
        let parciales = (getV('parcial1') * 0.15) + (getV('parcial2') * 0.20);
        let examenFinal = getV('final') * 0.20;

        let notaBase = clase + pruebasCortas + datacamp + parciales + examenFinal;

        // Puntos extra SOLO del proyecto
        let puntosExtraProyecto = getV('proyecto') * 0.06;

        let notaFinal = notaBase + puntosExtraProyecto;
        
        // El total no debe superar 100
        if (notaFinal > 100) notaFinal = 100;

        const totalDisplay = document.getElementById('total');
        const statusDisplay = document.getElementById('status');
        const resBox = document.getElementById('res-box');

        totalDisplay.innerText = notaFinal.toFixed(2);

        if (notaFinal >= 71) {
            statusDisplay.innerText = "Aprobado";
            resBox.style.background = "#d1f2eb";
            totalDisplay.style.color = "#0e6251";
            statusDisplay.style.color = "#0e6251";
        } else {
            statusDisplay.innerText = "Reprobado (Faltan " + (71 - notaFinal).toFixed(2) + " pts)";
            resBox.style.background = "#fdedec";
            totalDisplay.style.color = "#943126";
            statusDisplay.style.color = "#943126";
        }
    }
</script>

</body>
</html>
